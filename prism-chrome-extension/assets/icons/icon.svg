<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Neon prism edge gradients -->
    <linearGradient id="edge1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    
    <linearGradient id="edge2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="edge3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Soft glow background -->
  <circle cx="64" cy="64" r="50" fill="url(#glow)"/>

  <!-- Sleek outer hexagon -->
  <polygon points="64,12 108,37 108,87 64,112 20,87 20,37" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2"/>

  <!-- The Prism Geometry (3D Glass Pyramid) -->
  <!-- Left Face -->
  <polygon points="64,28 28,90 64,96" fill="rgba(79, 70, 229, 0.15)" stroke="url(#edge1)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Right Face -->
  <polygon points="64,28 100,90 64,96" fill="rgba(6, 182, 212, 0.15)" stroke="url(#edge2)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Bottom/Base Face -->
  <polygon points="28,90 100,90 64,96" fill="rgba(139, 92, 246, 0.25)" stroke="url(#edge3)" stroke-width="3" stroke-linejoin="round"/>

  <!-- Internal Light Refraction Lines -->
  <line x1="64" y1="28" x2="64" y2="96" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" stroke-dasharray="2 2"/>
  <circle cx="64" cy="28" r="3" fill="#ffffff"/>
</svg>
